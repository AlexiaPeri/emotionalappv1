<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expression Émotionnelle — Répétitions</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

  <div class="top-bar">
    <button class="lang-btn active" data-lang="fr">🇫🇷 Français</button>
    <button class="lang-btn" data-lang="en">🇬🇧 English</button>
  </div>

  <button class="settings-btn" id="settings-toggle" title="Réglages voix">⚙️</button>

  <div class="settings-panel" id="settings-panel">
    <label>Clé API ElevenLabs (optionnel)</label>
    <input type="password" id="api-key" placeholder="sk_..." autocomplete="off">
    <div class="hint-text">Gratuit sur <a href="https://elevenlabs.io" target="_blank" rel="noopener noreferrer" style="color:#7777cc">elevenlabs.io</a> — pour une voix naturelle</div>

    <label>Voix ElevenLabs</label>
    <select id="voice-select">
      <option value="pNInz6obpgDQGcFmaJgB">Adam (homme, calme)</option>
      <option value="ErXwobaYiN019PkySvjV">Antoni (homme, chaleureux)</option>
      <option value="onwK4e9ZLuTAKqWW03F9">Daniel (homme, britannique)</option>
      <option value="TxGEqnHWrfWFTfGW9XjX">Josh (homme, profond)</option>
      <option value="VR6AewLTigWG4xSOukaG">Arnold (homme, grave)</option>
      <option value="EXAVITQu4vr4xnSDxMaL">Bella (femme, douce)</option>
      <option value="XB0fDUnXU5powFXDhCwa">Charlotte (femme, douce)</option>
      <option value="MF3mGyEYCl7XYWbV9V6O">Elli (femme, jeune)</option>
    </select>

    <div id="tts-mode"></div>
  </div>

  <h1 id="title">Exprime-toi librement</h1>
  <div id="status">Appuie sur le micro pour commencer</div>

  <div id="transcript-area"></div>

  <button id="mic-btn" aria-label="Micro">
    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
  </button>
  <div id="stop-hint">Appuie à nouveau pour arrêter</div>

  <div class="hint" id="hint-text">Dis ce que tu ressens. La voix te le répétera.</div>
  <script type="module" src="./js/app.js"></script>

</body>
</html>
