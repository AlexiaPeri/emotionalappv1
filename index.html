<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expression Émotionnelle — Répétitions</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 300;
      margin-bottom: 2rem;
      color: #8888cc;
      text-align: center;
    }

    #status {
      font-size: 1.1rem;
      color: #aaa;
      margin-bottom: 1.5rem;
      text-align: center;
      min-height: 1.5em;
    }

    #transcript-area {
      width: 100%;
      max-width: 500px;
      margin-bottom: 2rem;
      max-height: 50vh;
      overflow-y: auto;
    }

    .bubble {
      padding: 1rem 1.2rem;
      border-radius: 1rem;
      margin-bottom: 0.8rem;
      max-width: 85%;
      line-height: 1.5;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .user-bubble {
      background: #2a2a4a;
      color: #ccc;
      margin-right: auto;
      border-bottom-left-radius: 0.3rem;
    }

    .voice-bubble {
      background: #3a2a5a;
      color: #d4b0ff;
      margin-left: auto;
      border-bottom-right-radius: 0.3rem;
    }

    .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.3rem;
      opacity: 0.6;
    }

    #mic-btn {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid #5555aa;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    #mic-btn:hover {
      border-color: #7777cc;
      background: rgba(85, 85, 170, 0.1);
    }

    #mic-btn.active {
      border-color: #4ade80;
      background: rgba(74, 222, 128, 0.08);
      animation: pulse 2s infinite;
    }

    #mic-btn.speaking {
      border-color: #a855f7;
      background: rgba(168, 85, 247, 0.1);
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.25); }
      50% { box-shadow: 0 0 0 15px rgba(74, 222, 128, 0); }
    }

    #mic-btn svg {
      width: 36px;
      height: 36px;
      fill: #8888cc;
      transition: fill 0.3s;
    }

    #mic-btn.active svg { fill: #4ade80; }
    #mic-btn.speaking svg { fill: #a855f7; }

    .hint {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #666;
      text-align: center;
    }

    #stop-hint {
      display: none;
      margin-top: 0.8rem;
      font-size: 0.8rem;
      color: #555;
    }

    #mic-btn.active ~ #stop-hint { display: block; }
  </style>
</head>
<body>

  <h1>Exprime-toi librement</h1>
  <div id="status">Appuie sur le micro pour commencer</div>

  <div id="transcript-area"></div>

  <button id="mic-btn" aria-label="Micro">
    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
  </button>
  <div id="stop-hint">Appuie à nouveau pour arrêter</div>

  <div class="hint">Dis ce que tu ressens. La voix te le répétera.</div>

<script>
// ─── Pronoun SWAP (bidirectional: je↔tu, me↔te, etc.) ───
// Two-phase: all matches → placeholders, then placeholders → swapped values

function convertPronouns(text) {
  let result = text.toLowerCase();

  // Phase 1: Replace all pronouns/forms with unique placeholders
  // ORDER MATTERS: longer/compound patterns first!
  const phaseOne = [
    // -même
    [/\bmoi-même\b/g, '⟦MOIMEME⟧'],
    [/\btoi-même\b/g, '⟦TOIMEME⟧'],

    // Compound: je + reflexive
    [/\bje me\b/g,    '⟦JEME⟧'],
    [/\btu te\b/g,    '⟦TUTE⟧'],
    [/\bje m['']/g,   '⟦JEM⟧'],
    [/\btu t['']/g,   '⟦TUT⟧'],

    // Compound: j'/je + avoir (handles "j'en ai", "j'y ai", "j'ai")
    [/\bj['']\s*en\s+ai\b/g,   '⟦JENAI⟧'],
    [/\btu\s+en\s+as\b/g,      '⟦TUENAS⟧'],
    [/\bj['']\s*y\s+ai\b/g,    '⟦JYAI⟧'],
    [/\btu\s+y\s+as\b/g,       '⟦TUYAS⟧'],
    [/\bj['']\s*en\s+avais\b/g, '⟦JENAVAIS⟧'],
    [/\btu\s+en\s+avais\b/g,    '⟦TUENAVAIS⟧'],
    [/\bj['']\s*ai\b/g,         '⟦JAI⟧'],
    [/\btu\s+as\b/g,            '⟦TUAS⟧'],
    [/\bj['']\s*avais\b/g,      '⟦JAVAIS⟧'],
    [/\btu\s+avais\b/g,         '⟦TUAVAIS⟧'],
    [/\bj['']\s*aurais\b/g,     '⟦JAURAIS⟧'],
    [/\btu\s+aurais\b/g,        '⟦TUAURAIS⟧'],
    [/\bj['']\s*aurai\b/g,      '⟦JAURAI⟧'],
    [/\btu\s+auras\b/g,         '⟦TUAURAS⟧'],

    // Compound: j'/je + être
    [/\bj['']\s*étais\b/g,  '⟦JETAIS⟧'],
    [/\btu\s+étais\b/g,     '⟦TUETAIS⟧'],
    [/\bje\s+suis\b/g,      '⟦JESUIS⟧'],
    [/\btu\s+es\b/g,        '⟦TUES⟧'],
    [/\bje\s+serai\b/g,     '⟦JESERAI⟧'],
    [/\btu\s+seras\b/g,     '⟦TUSERAS⟧'],
    [/\bje\s+serais\b/g,    '⟦JESERAIS⟧'],
    [/\btu\s+serais\b/g,    '⟦TUSERAIS⟧'],

    // Compound: je + aller
    [/\bje\s+vais\b/g,  '⟦JEVAIS⟧'],
    [/\btu\s+vas\b/g,   '⟦TUVAS⟧'],

    // Compound: je + faire
    [/\bje\s+fais\b/g,  '⟦JEFAIS⟧'],
    [/\btu\s+fais\b/g,  '⟦TUFAIS⟧'],

    // Compound: je + pouvoir
    [/\bje\s+peux\b/g,  '⟦JEPEUX⟧'],
    [/\btu\s+peux\b/g,  '⟦TUPEUX⟧'],

    // Compound: je + vouloir
    [/\bje\s+veux\b/g,  '⟦JEVEUX⟧'],
    [/\btu\s+veux\b/g,  '⟦TUVEUX⟧'],

    // Compound: je + devoir
    [/\bje\s+dois\b/g,  '⟦JEDOIS⟧'],
    [/\btu\s+dois\b/g,  '⟦TUDOIS⟧'],

    // Compound: je + savoir
    [/\bje\s+sais\b/g,  '⟦JESAIS⟧'],
    [/\btu\s+sais\b/g,  '⟦TUSAIS⟧'],

    // Compound: je + ne (negation)
    [/\bje\s+ne\b/g,    '⟦JENE⟧'],
    [/\btu\s+ne\b/g,    '⟦TUNE⟧'],
    [/\bje\s+n['']/g,   '⟦JEN⟧'],
    [/\btu\s+n['']/g,   '⟦TUN⟧'],

    // Compound: j'en / tu en (general, after specific "j'en ai" etc.)
    [/\bj['']\s*en\b/g, '⟦JEN2⟧'],
    [/\btu\s+en\b/g,    '⟦TUEN2⟧'],

    // Catch-all: j' + any vowel-starting verb
    [/\bj['']/g,      '⟦J⟧'],

    // Simple pronouns (must be AFTER all compounds)
    [/\bje\b/g,       '⟦JE⟧'],
    [/\btu\b/g,       '⟦TU⟧'],

    // Object pronouns
    [/\bme\b/g,       '⟦ME⟧'],
    [/\bte\b/g,       '⟦TE⟧'],
    [/\bm['']/g,      '⟦MP⟧'],
    [/\bt['']/g,      '⟦TP⟧'],

    // Possessives
    [/\bmon\b/g,      '⟦MON⟧'],
    [/\bton\b/g,      '⟦TON⟧'],
    [/\bma\b/g,       '⟦MA⟧'],
    [/\bta\b/g,       '⟦TA⟧'],
    [/\bmes\b/g,      '⟦MES⟧'],
    [/\btes\b/g,      '⟦TES⟧'],

    // Tonic pronouns
    [/\bmoi\b/g,      '⟦MOI⟧'],
    [/\btoi\b/g,      '⟦TOI⟧'],
  ];

  for (const [pat, placeholder] of phaseOne) {
    result = result.replace(pat, placeholder);
  }

  // Phase 2: Resolve placeholders → swapped values
  const resolve = {
    '⟦MOIMEME⟧': 'toi-même',   '⟦TOIMEME⟧': 'moi-même',
    '⟦JEME⟧': 'tu te',         '⟦TUTE⟧': 'je me',
    '⟦JEM⟧':  "tu t'",         '⟦TUT⟧':  "je m'",

    '⟦JENAI⟧': 'tu en as',     '⟦TUENAS⟧': "j'en ai",
    '⟦JYAI⟧':  'tu y as',      '⟦TUYAS⟧':  "j'y ai",
    '⟦JENAVAIS⟧': 'tu en avais', '⟦TUENAVAIS⟧': "j'en avais",
    '⟦JAI⟧':  'tu as',         '⟦TUAS⟧': "j'ai",
    '⟦JAVAIS⟧': 'tu avais',    '⟦TUAVAIS⟧': "j'avais",
    '⟦JAURAIS⟧': 'tu aurais',  '⟦TUAURAIS⟧': "j'aurais",
    '⟦JAURAI⟧': 'tu auras',    '⟦TUAURAS⟧': "j'aurai",

    '⟦JETAIS⟧': 'tu étais',    '⟦TUETAIS⟧': "j'étais",
    '⟦JESUIS⟧': 'tu es',       '⟦TUES⟧':   'je suis',
    '⟦JESERAI⟧': 'tu seras',   '⟦TUSERAS⟧': 'je serai',
    '⟦JESERAIS⟧': 'tu serais',  '⟦TUSERAIS⟧': 'je serais',

    '⟦JEVAIS⟧': 'tu vas',      '⟦TUVAS⟧':  'je vais',
    '⟦JEFAIS⟧': 'tu fais',     '⟦TUFAIS⟧': 'je fais',
    '⟦JEPEUX⟧': 'tu peux',     '⟦TUPEUX⟧': 'je peux',
    '⟦JEVEUX⟧': 'tu veux',     '⟦TUVEUX⟧': 'je veux',
    '⟦JEDOIS⟧': 'tu dois',     '⟦TUDOIS⟧': 'je dois',
    '⟦JESAIS⟧': 'tu sais',     '⟦TUSAIS⟧': 'je sais',

    '⟦JENE⟧':   'tu ne',       '⟦TUNE⟧':   'je ne',
    '⟦JEN⟧':    "tu n'",       '⟦TUN⟧':    "je n'",
    '⟦JEN2⟧':   'tu en',       '⟦TUEN2⟧':  "j'en",

    '⟦J⟧':  'tu ',
    '⟦JE⟧': 'tu',              '⟦TU⟧': 'je',
    '⟦ME⟧': 'te',              '⟦TE⟧': 'me',
    '⟦MP⟧': "t'",              '⟦TP⟧': "m'",
    '⟦MON⟧': 'ton',            '⟦TON⟧': 'mon',
    '⟦MA⟧':  'ta',             '⟦TA⟧':  'ma',
    '⟦MES⟧': 'tes',            '⟦TES⟧': 'mes',
    '⟦MOI⟧': 'toi',            '⟦TOI⟧': 'moi',
  };

  for (const [placeholder, value] of Object.entries(resolve)) {
    result = result.split(placeholder).join(value);
  }

  // Capitalize first letter
  result = result.charAt(0).toUpperCase() + result.slice(1);

  return result;
}

// ─── Speech Recognition (continuous) ───

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
  document.getElementById('status').textContent = "⚠️ Ton navigateur ne supporte pas la reconnaissance vocale. Utilise Chrome.";
  document.getElementById('mic-btn').disabled = true;
}

let recognition;
let isActive = false;
let isSpeaking = false;

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.lang = 'fr-FR';
  recognition.continuous = true;
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onresult = (event) => {
    const lastIdx = event.results.length - 1;
    const result = event.results[lastIdx];
    if (!result.isFinal) return;

    const userText = result[0].transcript.trim();
    if (!userText) return;

    addBubble('user', userText);

    const converted = convertPronouns(userText);
    addBubble('voice', converted);

    // Pause recognition while speaking to avoid feedback loop
    try { recognition.stop(); } catch(e) {}
    speakText(converted);
  };

  recognition.onerror = (event) => {
    console.error('Recognition error:', event.error);
    if (event.error === 'not-allowed') {
      setStatus("⚠️ Autorise l'accès au micro dans ton navigateur.");
      isActive = false;
      updateButton();
    } else if (isActive && event.error !== 'aborted') {
      restartRecognition();
    }
  };

  recognition.onend = () => {
    if (isActive && !isSpeaking) {
      restartRecognition();
    }
  };
}

function restartRecognition() {
  if (!isActive) return;
  setTimeout(() => {
    if (!isActive || isSpeaking) return;
    try {
      recognition.start();
      setStatus("🎙️ Je t'écoute...");
    } catch(e) {}
  }, 200);
}

// ─── TTS (natural male voice) ───

let bestVoice = null;

function findBestVoice() {
  const voices = speechSynthesis.getVoices();
  console.log('Available voices:', voices.map(v => `${v.name} [${v.lang}]`).join(', '));

  // Priority: male French voices
  const prefs = [
    // Google male FR
    v => v.lang.startsWith('fr') && v.name.includes('Google') && /male|homme/i.test(v.name),
    // Microsoft male FR (Thomas, Henri, Paul)
    v => v.lang.startsWith('fr') && /Thomas|Henri|Paul|Claude/i.test(v.name),
    // Any cloud/remote voice FR (tends to be better quality)
    v => v.lang.startsWith('fr') && !v.localService,
    // Google FR (any)
    v => v.lang.startsWith('fr') && v.name.includes('Google'),
    // Microsoft FR (any)
    v => v.lang.startsWith('fr') && v.name.includes('Microsoft'),
    // Any French voice
    v => v.lang.startsWith('fr'),
  ];

  for (const test of prefs) {
    const found = voices.find(test);
    if (found) {
      bestVoice = found;
      console.log('Selected voice:', found.name, found.lang);
      return;
    }
  }
}

function speakText(text) {
  isSpeaking = true;
  updateButton();
  setStatus("🔊 ...");

  speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'fr-FR';
  utterance.rate = 0.93;
  utterance.pitch = 0.95;  // Slightly lower for male voice feel
  utterance.volume = 1.0;

  if (bestVoice) utterance.voice = bestVoice;

  utterance.onend = () => {
    isSpeaking = false;
    updateButton();
    if (isActive) {
      setStatus("🎙️ Je t'écoute...");
      restartRecognition();
    }
  };

  utterance.onerror = () => {
    isSpeaking = false;
    updateButton();
    if (isActive) restartRecognition();
  };

  speechSynthesis.speak(utterance);
}

// ─── UI ───

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function updateButton() {
  const btn = document.getElementById('mic-btn');
  btn.classList.remove('active', 'speaking');
  if (isSpeaking) btn.classList.add('speaking');
  else if (isActive) btn.classList.add('active');
}

function addBubble(type, text) {
  const area = document.getElementById('transcript-area');
  const div = document.createElement('div');
  div.className = `bubble ${type === 'user' ? 'user-bubble' : 'voice-bubble'}`;

  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = type === 'user' ? 'Toi' : 'Voix';

  const content = document.createElement('div');
  content.textContent = text;

  div.appendChild(label);
  div.appendChild(content);
  area.appendChild(div);

  while (area.children.length > 20) {
    area.removeChild(area.firstChild);
  }
  area.scrollTop = area.scrollHeight;
}

function toggleSession() {
  if (isActive) {
    isActive = false;
    try { recognition.stop(); } catch(e) {}
    speechSynthesis.cancel();
    isSpeaking = false;
    updateButton();
    setStatus("Session terminée. Appuie pour recommencer.");
  } else {
    isActive = true;
    updateButton();
    setStatus("🎙️ Je t'écoute...");
    try { recognition.start(); } catch(e) {}
  }
}

document.getElementById('mic-btn').addEventListener('click', toggleSession);

// Load voices (some browsers load them async)
speechSynthesis.onvoiceschanged = () => findBestVoice();
findBestVoice();
</script>

</body>
</html>
